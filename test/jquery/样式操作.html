<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<script src="../jquery-3.5.1.min.js"></script>
</head>
<body>
	<input type="button" id="btn" value="变身">
	<br>
	<img src="../img/02.jpg" alt="">

	<script>
	$(function(){
		$("#btn").click(function(){
			//修改图片样式
			$('img').css('width','800px');
			console.log($('img').css('width'));

			//批量设置
			$('img').css({
				'width':'500px',
				'height':'300px',
				'border':'1px solid red'
			})
		})

		//jquery尺寸和位置操作
		//height() width() 不传参数表示获取，传参数表示设置,不用px
		$('img').height(200);
	})
	</script>
</body>
</html>
