	<script>
	$(function(){
		// $(".btn").on('click',function(){
		// 	alert('点个鸡儿');
		// })
		
		//on方法委托事件
		//通过现有的祖先元素，给其后代元素绑定事件
		//对未来元素生效（通过js追加到页面）
		$("#btns").on('click','.btn',function(){
			alert('点个鸡儿');
		})

			var input4 = $(".btn")[0].cloneNode();
			input4.value = '点个鸡儿';
			$("#btns")[0].appendChild(input4);
	})
	</script>

	<script>
		$(function(){
			//解绑事件	off方法
			//在绑定事件之前，调用off方法，解绑之前的事件
			$(".btn").off('click').on('click',function(){
				alert('新来的鸡儿');
			})
		})
	</script>
</body>
