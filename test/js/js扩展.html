<body>
	<script>
	String.prototype.upcases = function(){
		return this.slice(0,1).toUpperCase() + this.slice(1).toLowerCase();
	}

	console.log('hello'.upcases());
	console.log('heJJcsaCSC'.upcases());
	</script>

	<script>
	var a = 100;
	let b = 100
	console.log(a);
	console.log(b);

	a = 150;
	b = 150
	console.log(a);
	console.log(b);

	var a = 300;
	// let b = 300;
	console.log(a);
	console.log(b);

	let hello = 'hello world';
	console.log(hello);
	</script>
</body>
</html>
