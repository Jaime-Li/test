<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
</head>
<body>
	<div>
		<input type="button" value="隐藏" id="change">
		<img src="../img/banner2.png" alt="" id="img">
	</div>
	<div id="con">
		<p>pppppppp</p>
		<p>cdscdscds</p>
		<input type="button" value="变色" class="change" onclick="change();">
	</div>

	<div>
		<span>dadada</span>
		<span>ccscs</span>
		<span>cscsacsa</span>
		<input type="button" value="转变" id="turn">
	</div>

	<div>
		<img src="../img/01.ico" alt="" class="img">
		<input type="button" value="隐藏" class="turn">
	</div>

	<script>
	document.getElementById('change').onclick = function (){
		if(this.value == "隐藏"){
			document.getElementById('img').style.display = 'none';
			document.getElementById('change').value = "显示";

		}else if(this.value == "显示"){
			document.getElementById('img').style.display = 'block';
			document.getElementById('change').value = "隐藏";
		}
		
	}

	function change(){
		var p = document.querySelectorAll('p');

		for(var i=0;i<=p.length;i++){
			p[i].style.color = 'red';
		}
	}

	document.getElementById('turn').addEventListener('click',function(){
		var span = document.querySelectorAll('span');
		for(var i=0;i<=span.length;i++){
			span[i].style.color = 'blue';
		}
	})

	document.getElementById('turn').addEventListener('click',function(){
		alert('变色龙');
	})

	document.getElementsByClassName('turn')[0].onclick = function(){
		// alert(111);
		document.getElementsByClassName('img')[0].style.display = 'none';
	}
	
	</script>
</body>
</html>
