<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
</head>
<body>
	<script>
	var str = '1122 4343 5566 3446';
	var res = str.match(/\d{4}/g);
	//匹配连续的四个数字，第一和第二数字相同，第三第四数字相同
	var res = str.match(/(\d)\1(\d)\2/g);	//1122	5566
	console.log(res);

	//匹配第一个第三个相同
	var res = str.match(/(\d)(\d)\1\2/g);
	console.log(res);		//4343

	//匹配第二个第三个数字相同
	var res = str.match(/(\d)(\d)\2(\d)/g);
	console.log(res);		//3446

	//匹配中文
	var str = "你好，世界";
	var res = str.match(/[\u4E00-\u9FA5]/g);
	console.log(res);

	var res = str.match(/[u4E00-\u9FA5]{2}/g);
	console.log(res);


	var str = "今今今今天晚晚晚晚上吃吃吃吃吃鸡儿";
	var res = str.replace(/([u4E00-\u9FA5])\1+/g,'$1');
	console.log(res);
	</script>
</body>
</html>
