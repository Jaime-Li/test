<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<style>
		div{width: 500px;height: 300px;margin:50px auto;border:1px solid #ccc;padding:15px;}
		#err{color: red}
		#phone{width: 250px;height: 30px;}
		#btn{display: block;margin:20px auto;width: 50px;height: 30px;}
	</style>
</head>
<body>
	<div>
		<label for="">手机号码：</label>
		<input type="text" id="phone" placeholder="请输入手机号码">
		<span id="err"></span>
		<input type="button" id="btn" value="注册">
	</div>
	<script>
	document.getElementById("btn").onclick = function(){
		var phone_inpuit = document.getElementById('phone');
		var tel = phone_inpuit.value;
		var pattern = /^1(3[0-9]|4[579]|5[0-3,5-9]|66|7[0135678]|8[0-9]|9[89])\d{8}$/;	
		if(!tel){
			document.getElementById('err').innerHTML = '手机号码不能为空';
			phone_inpuit.focus();
		}else if(pattern.test(tel)){
			document.getElementById('err').innerHTML = '手机号码格式正确';
		}else{
			document.getElementById('err').innerHTML = '手机号码格式错误';
			phone_inpuit.focus();
		}
	}
	</script>
</body>
</html>
