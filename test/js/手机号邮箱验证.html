<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
</head>
<body>
	<script>
	//手机号
	//11位数	/^\d{11}$/
	//1开头，第二位3-9，后面9位数	/^1[3-9]\d{9}$/
	//限制前三位:1开头，二三位根据运营商开放段位情况
	
	var pattern =  /^1(3[0-9]|4[579]|5[0-3,5-9]|66|7[0135678]|8[0-9]|9[89])\d{8}$/;	
	var tel = 18407852079;
	console.log(pattern.test(tel));


	/*邮箱
	简单版：必须有@	/@/
	
	精确版
		必须有 @ 和 .	/^ @ \. $/i
		@前面是邮箱名，要求至少一个字符，要求是数字，字母，下划线，还可以用. -;但是开头必须是数字字母下划线
		/^\w[\w\.-]*@
		@和点之间：是一个域名，要求是至少一个字符，可以是数字字母中横线，开头是数字或字母
		/@[0-9a-z][0-9a-z-]*\./
		点后面：要求是至少一个字符，必须是字母
		/\.[a-z]+/
		点xxx,这部分可以出现一次，也可以出现多次
		/(\.[a-z]+)+/
		最后一个点后面，字符长度为2-6的字母
		/\.[a-z]{2,6}$/
		点后面的部分，综合起来：/(\.[a-z]+)*\.[a-z]{2,6}$/

	*/
	var pattern = /^\w[\w\.-]*@[0-9a-z][0-9a-z-]*(\.[a-z]+)*\.[a-z]{2,6}$/i;
	var email = '909760456@qq.com';
	console.log(pattern.test(email));
	</script>
</body>
</html>
