<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
</head>
<body>
	<script>
	//将数组中的值取出来，并一一赋值
	var arr = [1,2,3];
	var [a,b,c] = arr;
	console.log(a,b,c);

	//可以跳过部分值，使用逗号占位
	var arr = [3,4,5,6,7];
	var [a,b,c,,e] = arr;
	console.log(a,b,c,e);
	</script>

	<script>
	//对象解构
	var obj = {
		"age":30,
		"sex":"男",
		"say":function(){
			return "hello";
		}
	};

	var {age,sex,say} = obj;
	console.log(age,sex,say);
	console.log( say() );

	//跳过某些值，不写要跳过的变量
	var {age,say} = obj;
	console.log(age,say);

	//变量名必须和对象成员名一一对应
	var  {aa,sex,say} = obj;
	console.log(aa,sex);
	</script>

	<script>
	function f1(m,n,x){
		console.log(m,n,x);
	}
	f1(3,4,5);

	// var arr = [1,2,3];
	// f1(...arr)
	 
	function f2([m,n,x]){
		// var [m,n,i] = x;
		console.log(m,n,x);
	}
	var arr = [5,6,7];
	f2(arr);

	</script>
</body>
</html>
